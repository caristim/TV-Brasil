<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV BRASIL</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
    <style>
        :root {
            --bg-color: #0f111a;
            --card-bg: #1e2235;
            --accent-color: #00aaff;
            --text-color: #ffffff;
            --focus-scale: 1.05;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            overflow-x: hidden;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            color: var(--accent-color);
        }

        #channels-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .channel-card {
            background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
            border-radius: 16px;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .channel-card:hover, 
        .channel-card:focus {
            transform: translateY(-8px) scale(var(--focus-scale));
            border-color: var(--accent-color);
            background: linear-gradient(145deg, #2a2a2a, #333);
            box-shadow: 0 8px 25px rgba(0, 170, 255, 0.4);
            outline: none;
        }

        .channel-logo {
            width: 100%;
            max-width: 140px;
            height: 90px;
            margin: 0 auto 15px;
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .channel-logo svg {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .channel-name {
            font-size: 20px;
            font-weight: 600;
            color: #f0f0f0;
            text-align: center;
        }

        .hidden { 
            display: none !important; 
        }

        #video-player-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #video-player {
            width: 90%;
            height: 90%;
            max-width: 1600px;
            background: #000;
            border-radius: 8px;
        }

        #close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 10001;
            font-size: 28px;
            background: #ff3333;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        #close-btn:hover,
        #close-btn:focus {
            background: #ff0000;
            transform: scale(1.1);
            outline: none;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: var(--accent-color);
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 768px) {
            #channels-container {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 15px;
            }
            
            .channel-card {
                padding: 15px 10px;
            }
            
            .channel-logo {
                max-width: 100px;
                height: 70px;
            }
            
            .channel-name {
                font-size: 16px;
            }
            
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <h1>📺 TV BRASIL</h1>
    <div id="channels-container"></div>
    
    <div id="video-player-container" class="hidden">
        <button id="close-btn" onclick="closePlayer()">✕</button>
        <div id="loading">Cargando...</div>
        <video id="video-player" controls autoplay></video>
    </div>

    <script src="app.js"></script>
</body>
</html>
